<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수분화 컬러툴</title>
<style>
:root {
  --bg:#f5f3f0;--panel:#fff;--border:#e8e4df;--text:#2a2520;--text2:#7a7068;--text3:#b0a898;
  --accent:#5a7a5a;--accent2:#8a6a9a;--warn:#c07030;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;background:var(--bg);color:var(--text);line-height:1.6;}
.container{max-width:1200px;margin:0 auto;padding:20px;}
.header{margin-bottom:30px;}
.title{font-size:24px;font-weight:700;margin-bottom:4px;}
.subtitle{font-size:12px;color:var(--text3);}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px;}
.section-title{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:12px;}
.preset-buttons{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:16px;}
.preset-btn{padding:8px;border:1px solid var(--border);background:var(--bg);border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.15s;text-align:center;}
.preset-btn:hover{border-color:var(--accent);color:var(--accent);}
.preset-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.color-row{display:grid;grid-template-columns:50px 1fr 70px;gap:10px;align-items:center;margin-bottom:10px;}
.color-picker{width:50px;height:40px;border:none;border-radius:7px;cursor:pointer;padding:0;}
.color-label{font-size:11px;font-weight:600;color:var(--text2);}
.color-hex{font-family:'Courier New',monospace;font-size:11px;color:var(--text2);cursor:pointer;background:var(--bg);padding:4px 8px;border-radius:5px;text-align:center;}
.color-hex:hover{background:var(--border);}
.divider{height:1px;background:var(--border);margin:16px 0;}
.btn-group{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px;}
.color-input-row{display:grid;grid-template-columns:40px 1fr 70px;gap:8px;align-items:center;margin-bottom:8px;padding:8px;background:var(--bg);border-radius:7px;}
.color-input-row input[type=color]{width:40px;height:30px;border:none;border-radius:5px;cursor:pointer;padding:0;}
.color-input-row input[type=text]{padding:6px 8px;border:1px solid var(--border);border-radius:5px;font-size:11px;}
.color-input-row .color-hex{font-family:'Courier New',monospace;font-size:11px;color:var(--text2);cursor:pointer;}
.main-btn{width:100%;padding:12px;background:var(--text);color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;margin-top:10px;transition:all 0.15s;}
.main-btn:hover{background:#1a1510;}
.main-btn:disabled{background:#ccc;cursor:not-allowed;}
.api-input{width:100%;padding:8px;border:1px solid var(--border);border-radius:7px;font-size:11px;font-family:'Courier New',monospace;margin-bottom:6px;}
.api-status{font-size:10px;padding:4px 8px;border-radius:4px;display:inline-block;}
.api-status.ok{background:#e8f5e8;color:#3a7a3a;}
.result-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;}
.result-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.card-header{background:var(--bg);padding:10px;border-bottom:1px solid var(--border);}
.card-title{font-size:12px;font-weight:700;}
.card-body{padding:10px;}
.color-item{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:6px;background:var(--bg);border-radius:5px;cursor:pointer;transition:background 0.1s;}
.color-item:hover{background:#e8e6e3;}
.color-dot{width:30px;height:30px;border-radius:5px;flex-shrink:0;border:1px solid rgba(0,0,0,0.1);}
.color-info{flex:1;}
.color-type{font-size:9px;color:var(--text3);font-weight:600;}
.color-value{font-family:'Courier New',monospace;font-size:11px;color:var(--text2);}
.loading{text-align:center;padding:40px;}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.error{background:#fff5f5;border:1px solid #f0c0c0;border-radius:8px;padding:12px;color:#c03030;font-size:11px;}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="title">🎨 수분화 컬러툴</div>
    <div class="subtitle">환경광 80~90%, 명도차 30~40%</div>
  </div>

  <div class="grid">
    <!-- 왼쪽: 설정 -->
    <div>
      <!-- API Key -->
      <div class="panel">
        <div class="section-title">Claude API</div>
        <input type="password" id="apiKey" class="api-input" placeholder="sk-ant-...">
        <div id="api-status" class="api-status">필수</div>
      </div>

      <!-- 배경 프리셋 -->
      <div class="panel" style="margin-top:16px;">
        <div class="section-title">배경 프리셋</div>
        <div class="preset-buttons" id="bg-presets"></div>
        <div class="preset-buttons" id="time-presets" style="display:none;margin-top:10px;border-top:1px solid var(--border);padding-top:10px;"></div>
      </div>

      <!-- 환경 색 조정 -->
      <div class="panel" style="margin-top:16px;">
        <div class="section-title">환경 색 조정</div>
        <div class="color-row">
          <input type="color" id="env-sky" class="color-picker" value="#7a8b99">
          <label class="color-label">환경광</label>
          <span class="color-hex" id="env-sky-h" onclick="copy('#7a8b99')">#7a8b99</span>
        </div>
        <div class="color-row">
          <input type="color" id="env-light" class="color-picker" value="#cde2f2">
          <label class="color-label">빛색</label>
          <span class="color-hex" id="env-light-h" onclick="copy('#cde2f2')">#cde2f2</span>
        </div>
        <div class="color-row">
          <input type="color" id="env-rim" class="color-picker" value="#d0d8e0">
          <label class="color-label">반사광</label>
          <span class="color-hex" id="env-rim-h" onclick="copy('#d0d8e0')">#d0d8e0</span>
        </div>
      </div>

      <!-- 밑색 선택 -->
      <div class="panel" style="margin-top:16px;">
        <div class="section-title">내가 고른 밑색 (8가지)</div>
        <div id="color-inputs"></div>
        <button class="main-btn" onclick="runCorrection()">✨ 색 교정</button>
      </div>
    </div>

    <!-- 오른쪽: 결과 -->
    <div id="result-panel" class="panel">
      <div class="section-title">결과</div>
      <div id="result" style="text-align:center;color:var(--text3);padding:40px;">
        배경 프리셋을 선택하고 색을 입력한 후 "색 교정" 버튼을 누르세요
      </div>
    </div>
  </div>
</div>

<script>
const PRESETS = {
  '설원': {
    '새벽': {s:'#5a5b4b', l:'#90917d', r:'#85867d'},
    '아침': {s:'#7b7d99', l:'#ced1f2', r:'#d0d1e0'},
    '낮': {s:'#8fa1af', l:'#dbefff', r:'#eef6ff'},
    '낮(비)': {s:'#626b72', l:'#a2adb5', r:'#9fa3a8'},
    '노을': {s:'#89796b', l:'#d9c6b5', r:'#c9c1b9'},
    '저녁': {s:'#635e50', l:'#9d9786', r:'#918f87'}
  },
  '들판': {
    '새벽': {s:'#49414c', l:'#7e7681', r:'#775281'},
    '아침': {s:'#747f6c', l:'#ccd8c4', r:'#a0d884'},
    '낮': {s:'#8f927e', l:'#f6f8e2', r:'#e7f89d'},
    '낮(비)': {s:'#5e5f55', l:'#a0a296', r:'#99a273'},
    '노을': {s:'#72685f', l:'#c2b7ad', r:'#c2956b'},
    '저녁': {s:'#4b4652', l:'#847f8c', r:'#70568c'}
  },
  '바다': {
    '새벽': {s:'#525444', l:'#878977', r:'#736648'},
    '아침': {s:'#71718c', l:'#c4c5e5', r:'#7493c0'},
    '낮': {s:'#8492a1', l:'#dcedff', r:'#8ad4dc'},
    '낮(비)': {s:'#5a6169', l:'#99a2ab', r:'#658b90'},
    '노을': {s:'#7e6f62', l:'#cebcac', r:'#ac835d'},
    '저녁': {s:'#5b5749', l:'#94907f', r:'#7c5f4b'}
  },
  '사막': {
    '새벽': {s:'#3f3e4c', l:'#727081', r:'#4e487c'},
    '아침': {s:'#7f7e67', l:'#d8d7b9', r:'#d0ce74'},
    '낮': {s:'#928478', l:'#f8e7d7', r:'#efbd8b'},
    '낮(비)': {s:'#5f5852', l:'#a29991', r:'#9c8269'},
    '노을': {s:'#726559', l:'#c2b1a2', r:'#bb895c'},
    '저녁': {s:'#434652', l:'#787c8c', r:'#4b5787'}
  },
  '도시': {
    '새벽': {s:'#545344', l:'#898777', r:'#636453'},
    '아침': {s:'#71758c', l:'#c4cbe5', r:'#898aa8'},
    '낮': {s:'#8496a1', l:'#dcf3ff', r:'#a0b0c1'},
    '낮(비)': {s:'#5a6369', l:'#99a5ab', r:'#6d757e'},
    '노을': {s:'#7e6f62', l:'#cebcac', r:'#978677'},
    '저녁': {s:'#5b5549', l:'#948c7f', r:'#6d6959'}
  }
};

const COLORS = [
  ['#f4a0c0','머리'],['#f5d5b8','피부'],['#a0c8f4','옷1'],['#d4b0f0','옷2'],
  ['#e8c0a0','옷3'],['#c0e0d0','옷4'],['#d8a890','악세1'],['#a8d0a8','악세2']
];

function initUI() {
  let bg = document.getElementById('bg-presets');
  let currentBg = null;
  
  Object.keys(PRESETS).forEach(name => {
    let btn = document.createElement('button');
    btn.className = 'preset-btn';
    btn.textContent = name;
    btn.onclick = () => {
      document.querySelectorAll('#bg-presets .preset-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentBg = name;
      
      // 시간대 버튼 표시
      let timeBtns = document.getElementById('time-presets');
      timeBtns.innerHTML = '';
      timeBtns.style.display = 'grid';
      
      ['새벽', '아침', '낮', '낮(비)', '노을', '저녁'].forEach(time => {
        let tbtn = document.createElement('button');
        tbtn.className = 'preset-btn';
        tbtn.textContent = time;
        tbtn.style.gridColumn = 'auto';
        tbtn.onclick = () => {
          document.querySelectorAll('#time-presets .preset-btn').forEach(b => b.classList.remove('active'));
          tbtn.classList.add('active');
          
          let preset = PRESETS[name][time];
          document.getElementById('env-sky').value = preset.s;
          document.getElementById('env-light').value = preset.l;
          document.getElementById('env-rim').value = preset.r;
          updateEnvDisplay();
        };
        timeBtns.appendChild(tbtn);
      });
    };
    bg.appendChild(btn);
  });

  // 밑색 입력 필드
  let ci = document.getElementById('color-inputs');
  COLORS.forEach((c, idx) => {
    let row = document.createElement('div');
    row.className = 'color-input-row';
    row.innerHTML = `
      <input type="color" value="${c[0]}" data-idx="${idx}" onchange="updateColorInput(${idx})">
      <input type="text" placeholder="${c[1]}" value="${c[1]}" data-idx="${idx}">
      <span class="color-hex" onclick="copy('${c[0]}')">${c[0]}</span>
    `;
    ci.appendChild(row);
  });

  ['env-sky','env-light','env-rim'].forEach(id => {
    document.getElementById(id).addEventListener('change', e => {
      let hex = e.target.value;
      document.getElementById(id+'-h').textContent = hex;
      document.getElementById(id+'-h').onclick = () => copy(hex);
    });
  });
}

function updateColorInput(idx) {
  let rows = document.querySelectorAll('.color-input-row');
  let input = rows[idx].querySelector('input[type=color]');
  let hex = input.value;
  let hexSpan = rows[idx].querySelector('.color-hex');
  hexSpan.textContent = hex;
  hexSpan.onclick = () => copy(hex);
}

function updateEnvDisplay() {
  ['env-sky','env-light','env-rim'].forEach(id => {
    let val = document.getElementById(id).value;
    document.getElementById(id+'-h').textContent = val;
  });
}

function copy(hex) {
  navigator.clipboard.writeText(hex);
}

function getSelectedColors() {
  let colors = [];
  document.querySelectorAll('.color-input-row').forEach((row, idx) => {
    let colorInput = row.querySelector('input[type=color]');
    let labelInput = row.querySelector('input[type=text]');
    if (colorInput && colorInput.value) {
      colors.push({
        color: colorInput.value,
        label: labelInput.value || COLORS[idx][1]
      });
    }
  });
  return colors;
}

async function runCorrection() {
  let key = document.getElementById('apiKey').value.trim();
  if (!key) { alert('API Key를 입력해주세요!'); return; }

  let colors = getSelectedColors();
  if (!colors.length) { alert('색을 선택해주세요!'); return; }

  let sky = document.getElementById('env-sky').value;
  let light = document.getElementById('env-light').value;
  let rim = document.getElementById('env-rim').value;

  document.getElementById('result').innerHTML = '<div class="loading"><div class="spinner"></div><p>색감 교정 중...</p></div>';

  let colorList = colors.map(c => {
    let hex = c.color;
    let r = parseInt(hex.slice(1,3), 16);
    let g = parseInt(hex.slice(3,5), 16);
    let b = parseInt(hex.slice(5,7), 16);
    let brightness = (r + g + b) / 3;
    return {...c, brightness};
  }).sort((a, b) => b.brightness - a.brightness);

  let colorDesc = colorList.map((c, i) => {
    let rank = i === 0 ? '가장밝음' : (i === colorList.length - 1 ? '가장어두움' : i+'번째');
    return c.label + ': ' + c.color + ' (' + rank + ')';
  }).join('\n');

  let prompt = `수분화 밑색 교정 (환경광 80~90%, 명도차 30~40%)

[환경 색]
환경광: ${sky}
빛색: ${light}
반사광: ${rim}

[입력 색]
${colorDesc}

[규칙]
1. 밑색 = 그림자 (환경광 80~90% 이미 포함)
2. 빛색과 명도차 30~40% 유지
3. 한난대비: 난색↔한색
4. 반사광: 색상환 호 이동, 채도↑, 명도 유지, 빛보다 어두움
5. 명도 순서 유지

JSON만 응답:
{"parts":[{"label":"파트","orig":"#hex","base":"#hex","env_rim":"#hex","comp_rim":"#hex","note":"설명"}]}`;

  try {
    let resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'x-api-key': key},
      body: JSON.stringify({
        model: 'claude-opus-4-1-20250805',
        max_tokens: 1500,
        messages: [{role: 'user', content: prompt}]
      })
    });

    if (!resp.ok) {
      document.getElementById('result').innerHTML = '<div class="error">API 오류: ' + resp.status + '</div>';
      return;
    }

    let data = await resp.json();
    document.getElementById('api-status').textContent = '✓ 연결됨';
    document.getElementById('api-status').className = 'api-status ok';
    localStorage.setItem('colorToolKey', key);

    let text = data.content[0].text;
    let clean = text.replace(/```json|```/g, '').trim();
    let result = JSON.parse(clean);
    renderResult(result);
  } catch(e) {
    document.getElementById('result').innerHTML = '<div class="error">오류: ' + e.message + '</div>';
  }
}

function renderResult(data) {
  let html = '<div class="result-grid">';
  
  (data.parts || []).forEach(p => {
    html += '<div class="result-card">';
    html += '<div class="card-header"><div class="card-title">'+p.label+'</div><span style="font-size:10px;color:var(--text3);">'+p.orig+'</span></div>';
    html += '<div class="card-body">';
    
    [['밑색',p.base],['환경반사',p.env_rim],['보색반사',p.comp_rim]].forEach(x => {
      if (x[1]) {
        html += '<div class="color-item" onclick="copy(\''+x[1]+'\')">';
        html += '<div class="color-dot" style="background:'+x[1]+'"></div>';
        html += '<div><div class="color-type">'+x[0]+'</div><div class="color-value">'+x[1]+'</div></div>';
        html += '</div>';
      }
    });
    
    if (p.note) html += '<div style="font-size:10px;color:var(--text3);margin-top:8px;">'+p.note+'</div>';
    html += '</div></div>';
  });
  
  html += '</div>';
  document.getElementById('result').innerHTML = html;
}

document.addEventListener('DOMContentLoaded', () => {
  initUI();
  if (localStorage.getItem('colorToolKey')) {
    document.getElementById('apiKey').value = localStorage.getItem('colorToolKey');
  }
  updateEnvDisplay();
});
</script>
</body>
</html>
